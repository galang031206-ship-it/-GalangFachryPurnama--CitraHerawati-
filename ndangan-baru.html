<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Wedding of Galang & Citra</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Poppins', sans-serif; background: #000; overflow-x: hidden; }
        .font-aesthetic { font-family: 'Great Vibes', cursive; }
        .hero { 
            background: linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.7)), 
            url('https://r.jina.ai/i/27f50280b1814e5a939f604ec601726a'); 
            background-size: cover; background-position: center; background-attachment: fixed;
        }
        .glass { background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.2); }
    </style>
</head>
<body class="text-white text-center">
    <header class="hero h-screen flex items-center justify-center p-6 text-center">
        <div>
            <p class="uppercase tracking-[0.5em] text-xs mb-4 text-amber-200">The Wedding of</p>
            <h1 class="font-aesthetic text-7xl md:text-9xl mb-6 drop-shadow-2xl">Galang & Citra</h1>
            <p class="text-2xl font-light tracking-[0.3em]">08 . 03 . 2026</p>
        </div>
    </header>
    <section class="py-24 px-6 max-w-4xl mx-auto">
        <h2 class="font-aesthetic text-6xl text-amber-300 mb-10 text-center">Assalamu'alaikum</h2>
        <div class="space-y-8 mb-20 text-center">
            <h3 class="text-3xl font-bold uppercase tracking-widest text-center">Galang Fachry Purnama</h3>
            <p class="text-amber-400 font-aesthetic text-6xl text-center">&</p>
            <h3 class="text-3xl font-bold uppercase tracking-widest text-center">Citra Herawati</h3>
        </div>
        <div class="glass p-10 rounded-3xl shadow-2xl border-t-4 border-amber-500 max-w-md mx-auto">
            <h4 class="font-bold text-amber-400 text-2xl mb-4 text-center">Akad & Resepsi</h4>
            <p class="text-xl text-center font-bold">Minggu, 8 Maret 2026</p>
            <p class="text-amber-100 mb-6 text-center italic text-center">08:00 WIB - Selesai</p>
            <p class="text-sm uppercase tracking-widest text-gray-400 mb-2 text-center text-center">Lokasi</p>
            <p class="text-lg text-center font-medium">Gedung Pertemuan Utama</p>
        </div>
    </section>
</body>
</html>
